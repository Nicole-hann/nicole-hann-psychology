name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy
        run: |
          curl -s -X POST "https://api.vercel.com/v13/deployments?projectId=prj_Vfndro032e1XJ9uC9gKSICiX0W74" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"nicole-hann-psychology","target":"production","gitSource":{"type":"github","org":"Nicole-hann","repo":"nicole-hann-psychology","ref":"main"}}'

